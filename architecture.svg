<svg width="680" height="716" viewBox="0 0 680 716" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>GraphRAG OpenFDA architecture</title>
  <desc>Six-stage pipeline: OpenFDA knowledge graph, node embedding, FAISS vector index, retrieval and graph traversal, prompt assembly, and answer generation.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5f5e5a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="680" height="716" fill="#ffffff"/>

  <!-- 1: Graph -->
  <rect x="180" y="40" width="320" height="56" rx="8" fill="#f1efe8" stroke="#5f5e5a" stroke-width="0.5"/>
  <text x="340" y="60" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#2c2c2a">OpenFDA knowledge graph</text>
  <text x="340" y="78" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5f5e5a">NetworkX, ~110k nodes</text>
  <line x1="340" y1="96" x2="340" y2="156" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 2: Embedding -->
  <rect x="180" y="156" width="320" height="56" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
  <text x="340" y="176" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#04342c">Node embedding</text>
  <text x="340" y="194" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0f6e56">nomic-embed-text via Ollama</text>
  <line x1="340" y1="212" x2="340" y2="272" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 3: FAISS -->
  <rect x="180" y="272" width="320" height="56" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
  <text x="340" y="292" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#04342c">FAISS vector index</text>
  <text x="340" y="310" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0f6e56">IndexFlatIP, cosine similarity</text>
  <line x1="340" y1="328" x2="340" y2="388" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 4: Retrieval + traversal -->
  <rect x="180" y="388" width="320" height="56" rx="8" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
  <text x="340" y="408" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#26215c">Retrieval and graph traversal</text>
  <text x="340" y="426" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#534ab7">Resolve matches to drug_generic</text>
  <line x1="340" y1="444" x2="340" y2="504" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 5: Prompt assembly -->
  <rect x="180" y="504" width="320" height="56" rx="8" fill="#faece7" stroke="#993c1d" stroke-width="0.5"/>
  <text x="340" y="524" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#4a1b0c">Prompt assembly</text>
  <text x="340" y="542" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#993c1d">FDA label sections as context</text>
  <line x1="340" y1="560" x2="340" y2="620" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 6: Generation -->
  <rect x="180" y="620" width="320" height="56" rx="8" fill="#faece7" stroke="#993c1d" stroke-width="0.5"/>
  <text x="340" y="640" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#4a1b0c">Answer generation</text>
  <text x="340" y="658" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#993c1d">Llama-3 via Ollama</text>
</svg>
